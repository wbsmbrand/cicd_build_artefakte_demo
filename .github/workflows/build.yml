name: Build-Demo

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node.js vorbereiten
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Lint ausführen
        run: npm run lint

      - name: Webseite bauen
        run: npm run build

      - name: Smoke-Test ausführen
        run: npm test

      - name: Build-Artefakt speichern
        uses: actions/upload-artifact@v4
        with:
          name: statische-webseite-build
          path: src/
